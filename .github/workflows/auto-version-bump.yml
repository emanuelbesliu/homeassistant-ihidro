name: Auto Version Bump on Dependency Updates

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  auto-version:
    name: Automatic Version Bump
    if: |
      github.event.pull_request.merged == true &&
      (github.event.pull_request.user.login == 'dependabot[bot]' ||
       startsWith(github.event.pull_request.head.ref, 'dependabot/'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Get current version
        id: current_version
        run: |
          CURRENT_VERSION=$(python -c "import json; print(json.load(open('custom_components/ihidro/manifest.json'))['version'])")
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Calculate new version
        id: new_version
        run: |
          CURRENT="${{ steps.current_version.outputs.version }}"
          IFS='.' read -ra VERSION_PARTS <<< "$CURRENT"
          MAJOR="${VERSION_PARTS[0]}"
          MINOR="${VERSION_PARTS[1]}"
          PATCH="${VERSION_PARTS[2]}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          
          if [[ "$PR_TITLE" == *"major"* ]] || [[ "$PR_TITLE" == *"breaking"* ]]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [[ "$PR_TITLE" == *"minor"* ]] || [[ "$PR_TITLE" == *"feature"* ]]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version will be: $NEW_VERSION"

      - name: Update manifest.json version
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.new_version }}"
          python << 'PYTHON_SCRIPT'
          import json
          with open('custom_components/ihidro/manifest.json', 'r') as f:
              manifest = json.load(f)
          manifest['version'] = '${{ steps.new_version.outputs.new_version }}'
          with open('custom_components/ihidro/manifest.json', 'w') as f:
              json.dump(manifest, f, indent=2)
              f.write('\n')
          PYTHON_SCRIPT
          echo "Updated manifest.json to version $NEW_VERSION"

      - name: Update requirements in manifest.json
        run: |
          if [ -f "requirements.txt" ]; then
            python << 'PYTHON_SCRIPT'
          import json

          with open('requirements.txt') as f:
              reqs = [line.strip() for line in f if line.strip() and not line.startswith('#')]

          with open('custom_components/ihidro/manifest.json', 'r') as f:
              manifest = json.load(f)
          if reqs:
              manifest['requirements'] = reqs
          with open('custom_components/ihidro/manifest.json', 'w') as f:
              json.dump(manifest, f, indent=2)
              f.write('\n')
          print(f"Synced requirements: {reqs}")
          PYTHON_SCRIPT
          fi

      - name: Update CHANGELOG.md
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.new_version }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          CURRENT_DATE=$(date +%Y-%m-%d)
          
          cat > changelog_entry.txt << EOF
          ## [${NEW_VERSION}] - ${CURRENT_DATE}

          ### Changed
          - ${PR_TITLE} (#${PR_NUMBER})
          - Dependency updates from Dependabot

          EOF
          
          if [ -f "CHANGELOG.md" ]; then
            head -n 7 CHANGELOG.md > CHANGELOG.tmp
            cat changelog_entry.txt >> CHANGELOG.tmp
            tail -n +8 CHANGELOG.md >> CHANGELOG.tmp
            mv CHANGELOG.tmp CHANGELOG.md
            rm changelog_entry.txt
            echo "Updated CHANGELOG.md"
          fi

      - name: Create release zip
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.new_version }}"
          ZIP_NAME="homeassistant-ihidro-v${NEW_VERSION}.zip"
          cd custom_components/ihidro
          zip -r "../../${ZIP_NAME}" *.py manifest.json
          cd ../..
          echo "Created ${ZIP_NAME}"
          echo "zip_name=${ZIP_NAME}" >> $GITHUB_ENV

      - name: Commit changes
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.new_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/ihidro/manifest.json CHANGELOG.md
          git commit -m "chore: bump version to $NEW_VERSION" -m "Automated version bump after merging PR #${{ github.event.pull_request.number }}"
          git push origin main
          echo "Committed version bump"

      - name: Create Git tag
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.new_version }}"
          git tag "v${NEW_VERSION}"
          git push origin "v${NEW_VERSION}"
          echo "Created tag v${NEW_VERSION}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.new_version }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          
          cat > release_notes.md << 'EOF'
          ## What's Changed

          - ${{ github.event.pull_request.title }} (#${{ github.event.pull_request.number }})

          This release includes dependency updates from Dependabot.

          **Full Changelog**: See [CHANGELOG.md](https://github.com/emanuelbesliu/homeassistant-ihidro/blob/main/CHANGELOG.md)

          ## Installation

          ### Via HACS (Recommended)
          Update via HACS interface - you should see an update notification.

          ### Manual Installation
          Download the zip file and extract to your custom_components/ihidro/ directory.
          EOF
          
          gh release create "v${NEW_VERSION}" \
            --title "v${NEW_VERSION} - Dependency Updates" \
            --notes-file release_notes.md \
            "${{ env.zip_name }}"
          
          rm release_notes.md
          echo "Created GitHub release v${NEW_VERSION}"

      - name: Summary
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.new_version }}"
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## 🚀 Automatic Version Bump Complete
          
          ✅ **Version:** v${{ steps.new_version.outputs.new_version }}
          ✅ **Trigger:** PR #${{ github.event.pull_request.number }}
          ✅ **Release:** https://github.com/emanuelbesliu/homeassistant-ihidro/releases/tag/v${{ steps.new_version.outputs.new_version }}
          
          ### Changes Made:
          - Updated manifest.json to v${{ steps.new_version.outputs.new_version }}
          - Updated CHANGELOG.md
          - Created release zip file
          - Created git tag v${{ steps.new_version.outputs.new_version }}
          - Published GitHub release
          EOF
