---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ihidro-browser
  namespace: flaresolverr
  labels:
    app: ihidro-browser
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ihidro-browser
  template:
    metadata:
      labels:
        app: ihidro-browser
    spec:
      containers:
        - name: ihidro-browser
          image: ghcr.io/emanuelbesliu/ihidro-browser:v0.1.1
          ports:
            - containerPort: 8193
              protocol: TCP
          env:
            - name: LOG_LEVEL
              value: info
            - name: HEADLESS
              value: "true"
            - name: TZ
              value: Europe/Bucharest
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8193
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8193
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ihidro-browser
  namespace: flaresolverr
  labels:
    app: ihidro-browser
spec:
  type: LoadBalancer
  selector:
    app: ihidro-browser
  ports:
    - port: 8193
      targetPort: 8193
      protocol: TCP
      name: http
